<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACKR</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f13;
    --surface: #13161c;
    --surface2: #1a1e27;
    --surface3: #0f1117;
    --border: #2a2f3d;
    --border2: #3a4057;
    --text: #e8eaf0;
    --text2: #8890a8;
    --text3: #4a5268;
    --accent: #4f8ef7;
    --accent2: #7c5cf7;
    --green: #3ecf8e;
    --danger: #f75f5f;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--green), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo span { -webkit-text-fill-color: var(--text3); font-weight: 400; font-size: 11px; margin-left: 8px; }

  .header-actions { display: flex; gap: 6px; }

  button { font-family: var(--sans); cursor: pointer; border: none; outline: none; transition: all 0.14s; }

  .btn {
    padding: 6px 13px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.2px;
  }
  .btn-primary { background: var(--green); color: #0d1a12; }
  .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }

  /* ── Container ── */
  #projects-container { display: flex; flex-direction: column; gap: 8px; }

  /* ══════════════════════════════════════════
     NODE CARD
     Collapsed = just the bar-face
     Expanded  = bar-face + body panel
  ══════════════════════════════════════════ */
  .node-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.18s;
  }
  .node-card:hover { border-color: var(--border2); }

  /* ── Bar face (always visible) ── */
  .bar-face {
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    user-select: none;
    position: relative;
    padding: 0 10px 0 8px;
    height: 36px;          /* fixed compact height */
  }

  /* Expand chevron */
  .chevron {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 8px;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-right: 6px;
  }
  .chevron.open { transform: rotate(90deg); }

  /* Bar wrapper: bar track + name label floated above it */
  .bar-wrapper {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    padding: 4px 0;
  }

  .bar-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
    /* inline edit */
    cursor: text;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    width: fit-content;
    max-width: 100%;
  }
  .bar-name:hover { color: var(--text2); border-bottom-color: var(--border2); }
  .bar-name:focus { outline: none; color: var(--text); border-bottom-color: var(--accent); }

  .bar-track {
    width: 100%;
    height: 10px;
    background: var(--surface2);
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), background-color 0.3s;
  }

  /* % number */
  .pct-num {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    min-width: 38px;
    text-align: right;
    margin-left: 10px;
    flex-shrink: 0;
  }

  /* delete btn always visible on hover */
  .del-btn {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: transparent;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    border: 1px solid transparent;
    margin-left: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s, border-color 0.15s;
  }
  .bar-face:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: rgba(247,95,95,0.12); color: var(--danger); border-color: rgba(247,95,95,0.3); }

  /* ── Expanded body ── */
  .node-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .node-body.open { display: block; }

  /* Controls row: − step + and child/settings actions */
  .body-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    flex-wrap: wrap;
    background: var(--surface2);
  }

  .adj-btn {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
    padding-bottom: 1px;
    transition: all 0.12s;
  }
  .adj-btn:hover { background: var(--green); border-color: var(--green); color: #0d1a12; transform: scale(1.08); }

  .step-input {
    width: 42px;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 3px;
    border-radius: 4px;
    outline: none;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .step-input:focus { border-color: var(--accent); color: var(--text); }

  .controls-sep {
    flex: 1;
  }

  .action-btn {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    letter-spacing: 0.2px;
    transition: all 0.14s;
  }
  .action-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }
  .action-btn.add-bar:hover { color: var(--accent); border-color: rgba(79,142,247,0.4); }
  .action-btn.add-tasks:hover { color: var(--green); border-color: rgba(62,207,142,0.4); }

  /* Settings panel (inside body) */
  .settings-panel {
    padding: 10px;
    background: var(--surface3);
    border-top: 1px solid var(--border);
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-end;
  }
  .settings-panel.open { display: flex; }

  .field-group { display: flex; flex-direction: column; gap: 3px; }

  label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--text3);
  }

  input[type="text"], input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }

  .color-pair { display: flex; gap: 5px; align-items: center; }

  input[type="color"] {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    cursor: pointer;
    padding: 2px;
  }

  /* ── Children container ── */
  .children-container {
    padding: 6px 8px 6px 22px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--border);
  }

  /* ══════════════════════════════════════════
     TASK BOX  (child node, tasks type)
  ══════════════════════════════════════════ */
  .task-box-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .task-node-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .task-node-body.open { display: block; }

  .task-settings-panel {
    padding: 8px 10px;
    background: var(--surface3);
    border-bottom: 1px solid var(--border);
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-end;
  }
  .task-settings-panel.open { display: flex; }

  .task-list { display: flex; flex-direction: column; gap: 3px; padding: 6px 10px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    transition: border-color 0.15s;
  }
  .task-item:hover { border-color: var(--border2); }
  .task-item.done { opacity: 0.48; }

  .task-check { width: 13px; height: 13px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }

  .task-name-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 0;
    outline: none;
  }
  .task-item.done .task-name-input { text-decoration: line-through; color: var(--text3); }

  .task-del-btn {
    background: transparent; border: none;
    color: transparent; cursor: pointer;
    font-size: 10px; padding: 2px;
    transition: color 0.12s;
  }
  .task-item:hover .task-del-btn { color: var(--text3); }
  .task-del-btn:hover { color: var(--danger) !important; }

  .add-task-row {
    display: flex; gap: 5px;
    padding: 0 10px 7px;
  }
  .add-task-row input { flex: 1; font-size: 11px; padding: 4px 8px; }

  /* ── Modal (only for new project) ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none; transition: opacity 0.18s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 22px; width: 360px; max-width: 95vw;
    transform: translateY(10px); transition: transform 0.18s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-size: 15px; font-weight: 800; margin-bottom: 16px;
    background: linear-gradient(135deg, var(--green), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .modal-fields { display: flex; flex-direction: column; gap: 11px; margin-bottom: 18px; }
  .modal-fields .field-group input,
  .modal-fields .field-group select { width: 100%; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 7px; }

  /* ── Empty ── */
  .empty-state { text-align: center; padding: 52px 24px; color: var(--text3); }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 18px; right: 18px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 9px 15px;
    font-size: 12px; color: var(--text);
    box-shadow: 0 6px 28px rgba(0,0,0,0.5);
    transform: translateY(46px); opacity: 0; transition: all 0.25s; z-index: 2000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* type pill */
  .type-pill {
    font-size: 8px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 2px 5px; border-radius: 20px; flex-shrink: 0;
  }
  .type-pill.bar  { background: rgba(79,142,247,0.1); color: var(--accent); }
  .type-pill.tasks{ background: rgba(62,207,142,0.1); color: var(--green); }

  .weight-badge {
    font-family: var(--mono); font-size: 9px; color: var(--text3);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 20px;
  }

  /* settings toggle btn (gear inside body-controls) */
  .gear-btn {
    font-size: 11px; padding: 4px 7px;
    border-radius: 4px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text3); transition: all 0.14s;
  }
  .gear-btn:hover, .gear-btn.active { color: var(--text); border-color: var(--border2); background: var(--surface3); }
  .gear-btn.active { color: var(--accent); border-color: rgba(79,142,247,0.4); }
</style>
</head>
<body>

<header>
  <div class="logo">TRACKR <span>Project Progress</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="importData()">⬆ Import</button>
    <button class="btn btn-ghost" onclick="exportData()">⬇ Export</button>
    <button class="btn btn-primary" onclick="openNewProjectModal()">+ New Project</button>
  </div>
</header>

<div id="projects-container"></div>

<!-- New Project Modal -->
<div class="modal-overlay" id="new-project-modal">
  <div class="modal">
    <h2>New Project</h2>
    <div class="modal-fields">
      <div class="field-group">
        <label>Project Name</label>
        <input type="text" id="new-project-name" placeholder="My Awesome Project" />
      </div>
      <div class="field-group">
        <label>Color Mode</label>
        <select id="new-project-color-mode" onchange="updateNewProjectColorUI()">
          <option value="single">Single Color</option>
          <option value="range">Color Range (0→100%)</option>
        </select>
      </div>
      <div class="field-group" id="np-color-single-wrap">
        <label>Color</label>
        <input type="color" id="np-color-single" value="#3ecf8e" />
      </div>
      <div class="field-group" id="np-color-range-wrap" style="display:none">
        <label>From → To</label>
        <div class="color-pair">
          <input type="color" id="np-color-from" value="#f75f5f" />
          <span style="color:var(--text3);font-size:10px">→</span>
          <input type="color" id="np-color-to" value="#3ecf8e" />
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('new-project-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)" />

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let projects = [];
let idCounter = 0;
const genId = () => ++idCounter;

// ─── Data helpers ────────────────────────────────────────────────────────────
function findNode(id, nodes) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.type === 'bar' && n.children) { const f = findNode(id, n.children); if (f) return f; }
  }
  return null;
}

function removeNode(id, nodes) {
  for (let i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) { nodes.splice(i, 1); return true; }
    if (nodes[i].type === 'bar' && nodes[i].children && removeNode(id, nodes[i].children)) return true;
  }
  return false;
}

function calcProgress(node) {
  if (node.type === 'tasks') {
    if (!node.tasks?.length) return 0;
    return Math.round(node.tasks.filter(t => t.done).length / node.tasks.length * 100);
  }
  if (!node.children?.length) return node.progress || 0;
  let tw = 0, ws = 0;
  for (const c of node.children) { const w = c.weight||1; tw += w; ws += calcProgress(c)*w; }
  return tw ? Math.round(ws/tw) : 0;
}

function getColor(node, pct) {
  if (node.colorMode === 'range') return lerp(node.colorFrom||'#f75f5f', node.colorTo||'#3ecf8e', pct/100);
  return node.color || '#3ecf8e';
}

function lerp(c1, c2, t) {
  const p = s => [parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];
  const [r1,g1,b1]=p(c1),[r2,g2,b2]=p(c2);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const c = document.getElementById('projects-container');
  if (!projects.length) {
    c.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>No projects yet. Hit <strong>+ New Project</strong> to get started.</p></div>`;
    return;
  }
  c.innerHTML = '';
  for (const p of projects) c.appendChild(buildBarNode(p, true));
}

function buildBarNode(node, isRoot) {
  const pct   = calcProgress(node);
  const color = getColor(node, pct);
  const hasKids = node.children?.length > 0;

  const card = document.createElement('div');
  card.className = 'node-card';
  card.dataset.id = node.id;

  // ── Bar face (always visible) ──────────────────────────────────────────────
  const face = document.createElement('div');
  face.className = 'bar-face';

  face.innerHTML = `
    <div class="chevron ${node.open?'open':''}">▶</div>
    <div class="bar-wrapper">
      <div class="bar-name" contenteditable="true" spellcheck="false"
           title="Click to rename"
           onblur="commitName(event,${node.id})"
           onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
           onclick="event.stopPropagation()"
      >${esc(node.name)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
    <div class="pct-num" style="color:${color}">${pct}%</div>
    <button class="del-btn" title="Delete" onclick="deleteNode(event,${node.id})">✕</button>
  `;

  // chevron click toggles body
  face.addEventListener('click', () => toggleOpen(node.id));
  card.appendChild(face);

  // ── Expanded body ──────────────────────────────────────────────────────────
  const body = document.createElement('div');
  body.className = `node-body ${node.open?'open':''}`;

  // Controls row (adjusters + action buttons)
  const ctrl = document.createElement('div');
  ctrl.className = 'body-controls';
  ctrl.addEventListener('click', e => e.stopPropagation());

  if (!hasKids) {
    ctrl.innerHTML = `
      <button class="adj-btn" onclick="adj(${node.id},-1)">−</button>
      <input class="step-input" type="number" min="1" max="100" value="${node.stepSize||5}"
        title="Step size" oninput="setField(${node.id},'stepSize',parseInt(this.value)||1)" />
      <button class="adj-btn" onclick="adj(${node.id},1)">+</button>
      <div class="controls-sep"></div>
      <button class="action-btn add-bar" onclick="addChild(${node.id},'bar')">+ Bar</button>
      <button class="action-btn add-tasks" onclick="addChild(${node.id},'tasks')">+ Tasks</button>
      <button class="gear-btn ${node.settingsOpen?'active':''}" onclick="toggleSettings(${node.id})">⚙</button>
    `;
  } else {
    ctrl.innerHTML = `
      <div class="controls-sep"></div>
      <button class="action-btn add-bar" onclick="addChild(${node.id},'bar')">+ Bar</button>
      <button class="action-btn add-tasks" onclick="addChild(${node.id},'tasks')">+ Tasks</button>
      <button class="gear-btn ${node.settingsOpen?'active':''}" onclick="toggleSettings(${node.id})">⚙</button>
    `;
  }
  body.appendChild(ctrl);

  // Settings panel
  const sp = document.createElement('div');
  sp.className = `settings-panel ${node.settingsOpen?'open':''}`;
  sp.addEventListener('click', e => e.stopPropagation());
  sp.innerHTML = buildSettingsHTML(node, isRoot);
  body.appendChild(sp);

  // Children
  if (hasKids) {
    const cc = document.createElement('div');
    cc.className = 'children-container';
    for (const child of node.children)
      cc.appendChild(child.type === 'bar' ? buildBarNode(child, false) : buildTaskBox(child));
    body.appendChild(cc);
  }

  card.appendChild(body);
  return card;
}

function buildSettingsHTML(node, isRoot) {
  const colorUI = node.colorMode === 'range'
    ? `<div class="field-group">
        <label>From → To</label>
        <div class="color-pair">
          <input type="color" value="${node.colorFrom||'#f75f5f'}" oninput="setField(${node.id},'colorFrom',this.value)" />
          <span style="color:var(--text3);font-size:10px">→</span>
          <input type="color" value="${node.colorTo||'#3ecf8e'}" oninput="setField(${node.id},'colorTo',this.value)" />
        </div>
       </div>`
    : `<div class="field-group">
        <label>Color</label>
        <input type="color" value="${node.color||'#3ecf8e'}" oninput="setField(${node.id},'color',this.value)" />
       </div>`;

  return `
    <div class="field-group">
      <label>Color Mode</label>
      <select style="width:110px" onchange="setColorMode(${node.id},this.value)">
        <option value="single" ${node.colorMode!=='range'?'selected':''}>Single</option>
        <option value="range"  ${node.colorMode==='range' ?'selected':''}>Range</option>
      </select>
    </div>
    ${colorUI}
    ${!isRoot ? `
    <div class="field-group">
      <label>Weight</label>
      <input type="number" style="width:66px" min="0.1" step="0.1" value="${node.weight||1}"
        oninput="setField(${node.id},'weight',parseFloat(this.value)||1)" />
    </div>` : ''}
  `;
}

function buildTaskBox(node) {
  const pct   = calcProgress(node);
  const color = node.color || '#3ecf8e';

  const card = document.createElement('div');
  card.className = 'task-box-card';
  card.dataset.id = node.id;

  // face
  const face = document.createElement('div');
  face.className = 'bar-face';
  face.innerHTML = `
    <div class="chevron ${node.open?'open':''}">▶</div>
    <div class="bar-wrapper">
      <div class="bar-name" contenteditable="true" spellcheck="false"
           title="Click to rename"
           onblur="commitName(event,${node.id})"
           onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
           onclick="event.stopPropagation()"
      >${esc(node.name)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
    <div class="pct-num" style="color:${color}">${pct}%</div>
    <button class="del-btn" title="Delete" onclick="deleteNode(event,${node.id})">✕</button>
  `;
  face.addEventListener('click', () => toggleOpen(node.id));
  card.appendChild(face);

  // body
  const body = document.createElement('div');
  body.className = `task-node-body ${node.open?'open':''}`;

  // task settings panel
  const sp = document.createElement('div');
  sp.className = `task-settings-panel ${node.settingsOpen?'open':''}`;
  sp.addEventListener('click', e => e.stopPropagation());
  sp.innerHTML = `
    <div class="field-group">
      <label>Color</label>
      <input type="color" value="${color}" oninput="setField(${node.id},'color',this.value)" />
    </div>
    <div class="field-group">
      <label>Weight</label>
      <input type="number" style="width:66px" min="0.1" step="0.1" value="${node.weight||1}"
        oninput="setField(${node.id},'weight',parseFloat(this.value)||1)" />
    </div>
  `;
  body.appendChild(sp);

  // task list
  const tl = document.createElement('div');
  tl.className = 'task-list';
  for (const t of (node.tasks||[])) {
    const ti = document.createElement('div');
    ti.className = `task-item ${t.done?'done':''}`;
    ti.innerHTML = `
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask(${node.id},'${t.id}',this.checked)" />
      <input type="text" class="task-name-input" value="${esc(t.name)}" oninput="renameTask(${node.id},'${t.id}',this.value)" />
      <button class="task-del-btn" onclick="deleteTask(${node.id},'${t.id}')">✕</button>
    `;
    tl.appendChild(ti);
  }
  body.appendChild(tl);

  // add task row + gear
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.addEventListener('click', e => e.stopPropagation());
  addRow.innerHTML = `
    <input type="text" placeholder="New task…" id="nt-${node.id}" onkeydown="if(event.key==='Enter')addTask(${node.id})" />
    <button class="btn btn-ghost" style="font-size:10px;padding:3px 9px;flex-shrink:0" onclick="addTask(${node.id})">+ Add</button>
    <button class="gear-btn ${node.settingsOpen?'active':''}" onclick="toggleSettings(${node.id})" style="margin-left:2px">⚙</button>
  `;
  body.appendChild(addRow);
  card.appendChild(body);
  return card;
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function toggleOpen(id) {
  const n = findNode(id, projects);
  if (n) { n.open = !n.open; render(); }
}

function toggleSettings(id) {
  const n = findNode(id, projects);
  if (n) { n.settingsOpen = !n.settingsOpen; render(); }
}

function commitName(e, id) {
  e.stopPropagation();
  const n = findNode(id, projects);
  if (!n) return;
  const txt = e.target.innerText.trim();
  if (txt && txt !== n.name) { n.name = txt; render(); }
}

function setField(id, field, value) {
  const n = findNode(id, projects);
  if (!n) return;
  n[field] = value;
  render();
}

function setColorMode(id, mode) {
  const n = findNode(id, projects);
  if (!n) return;
  n.colorMode = mode;
  render();
}

function adj(id, dir) {
  const n = findNode(id, projects);
  if (!n) return;
  n.progress = Math.min(100, Math.max(0, (n.progress||0) + dir*(n.stepSize||5)));
  render();
}

function deleteNode(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this item and all its children?')) return;
  if (!removeNode(id, projects)) {
    const i = projects.findIndex(p => p.id === id);
    if (i !== -1) projects.splice(i, 1);
  }
  render();
}

function addChild(parentId, type) {
  const parent = findNode(parentId, projects);
  if (!parent) return;
  if (!parent.children) parent.children = [];
  const base = { id: genId(), open: true, settingsOpen: false, weight: 1 };
  if (type === 'bar') {
    parent.children.push({ ...base, type:'bar', name:'New Bar', progress:0, stepSize:5, colorMode:'single', color:'#3ecf8e', children:[] });
  } else {
    parent.children.push({ ...base, type:'tasks', name:'New Tasks', color:'#3ecf8e', tasks:[] });
  }
  parent.open = true;
  render();
}

// ─── Task actions ─────────────────────────────────────────────────────────────
function toggleTask(nodeId, taskId, checked) {
  const n = findNode(nodeId, projects);
  if (!n) return;
  const t = n.tasks.find(t => t.id == taskId);
  if (t) t.done = checked;
  render();
}

function renameTask(nodeId, taskId, name) {
  const n = findNode(nodeId, projects);
  if (!n) return;
  const t = n.tasks.find(t => t.id == taskId);
  if (t) t.name = name;
  render();
}

function deleteTask(nodeId, taskId) {
  const n = findNode(nodeId, projects);
  if (!n) return;
  n.tasks = n.tasks.filter(t => t.id != taskId);
  render();
}

function addTask(nodeId) {
  const inp = document.getElementById(`nt-${nodeId}`);
  if (!inp?.value.trim()) return;
  const n = findNode(nodeId, projects);
  if (!n) return;
  if (!n.tasks) n.tasks = [];
  n.tasks.push({ id: genId(), name: inp.value.trim(), done: false });
  render();
}

// ─── Modal (new project only) ─────────────────────────────────────────────────
const openModal  = id => document.getElementById(id).classList.add('open');
const closeModal = id => document.getElementById(id).classList.remove('open');

function openNewProjectModal() {
  document.getElementById('new-project-name').value = '';
  document.getElementById('new-project-color-mode').value = 'single';
  updateNewProjectColorUI();
  openModal('new-project-modal');
  setTimeout(() => document.getElementById('new-project-name').focus(), 80);
}

function updateNewProjectColorUI() {
  const m = document.getElementById('new-project-color-mode').value;
  document.getElementById('np-color-single-wrap').style.display = m === 'single' ? '' : 'none';
  document.getElementById('np-color-range-wrap').style.display  = m === 'range'  ? '' : 'none';
}

function createProject() {
  const name = document.getElementById('new-project-name').value.trim();
  if (!name) { alert('Please enter a project name.'); return; }
  const colorMode = document.getElementById('new-project-color-mode').value;
  projects.push({
    id: genId(), type: 'bar', name, progress: 0, stepSize: 5,
    colorMode,
    color:      document.getElementById('np-color-single').value,
    colorFrom:  document.getElementById('np-color-from').value,
    colorTo:    document.getElementById('np-color-to').value,
    children: [], open: false, settingsOpen: false
  });
  closeModal('new-project-modal');
  render();
  showToast(`"${name}" created`);
}

// ─── Import / Export ──────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({projects,idCounter},null,2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `trackr-${new Date().toISOString().slice(0,10)}.json`
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Exported!');
}

function importData() { document.getElementById('import-file').click(); }

function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.projects) throw 0;
      projects = d.projects; idCounter = d.idCounter || 1000;
      render(); showToast('Imported!');
    } catch { alert('Import failed — invalid file.'); }
  };
  r.readAsText(file); e.target.value = '';
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});

render();
</script>
</body>
