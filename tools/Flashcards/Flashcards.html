<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: #16161e;
    border-bottom: 1px solid #2a2a3a;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #a78bfa;
  }

  .mode-tabs {
    display: flex;
    gap: 6px;
    background: #0f0f13;
    padding: 4px;
    border-radius: 8px;
    border: 1px solid #2a2a3a;
  }

  .mode-tabs button {
    padding: 6px 18px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
  }

  .mode-tabs button.active {
    background: #a78bfa;
    color: #fff;
  }

  .lm-url {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: #555;
  }

  .lm-url input {
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    padding: 4px 8px;
    color: #aaa;
    font-size: 0.78rem;
    width: 200px;
  }

  .lm-url input:focus { outline: none; border-color: #a78bfa; color: #e8e8f0; }

  main { padding: 32px 28px; max-width: 820px; margin: 0 auto; }

  /* ── MANAGE MODE ── */
  #manage-view .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .count-badge {
    font-size: 0.8rem;
    color: #666;
    background: #1e1e2a;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #2a2a3a;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn-primary { background: #a78bfa; color: #fff; }
  .btn-primary:hover { background: #9570f5; }
  .btn-ghost { background: #1e1e2a; color: #aaa; border: 1px solid #2a2a3a; }
  .btn-ghost:hover { background: #252535; color: #e8e8f0; }
  .btn-danger { background: transparent; color: #ef4444; border: 1px solid #3a1e1e; }
  .btn-danger:hover { background: #3a1e1e; }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

  .card-list { display: flex; flex-direction: column; gap: 10px; }

  .card-item {
    background: #16161e;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: border-color 0.15s;
  }

  .card-item:hover { border-color: #3a3a55; }

  .card-item-content { flex: 1; min-width: 0; }

  .card-item-q {
    font-size: 0.9rem;
    font-weight: 500;
    color: #c4b5fd;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-item-a {
    font-size: 0.82rem;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* Edit form */
  .card-form {
    background: #16161e;
    border: 1px solid #a78bfa44;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .card-form.open { display: block; }

  .card-form h3 { font-size: 0.9rem; color: #a78bfa; margin-bottom: 14px; font-weight: 600; }

  .field { margin-bottom: 12px; }

  .field label { display: block; font-size: 0.78rem; color: #666; margin-bottom: 5px; }

  .field input, .field textarea {
    width: 100%;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e8e8f0;
    font-size: 0.88rem;
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus { outline: none; border-color: #a78bfa; }

  .form-actions { display: flex; gap: 8px; margin-top: 4px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #444;
  }

  .empty-state p { font-size: 0.9rem; margin-top: 8px; }

  /* ── STUDY MODE ── */
  #study-view { display: none; }

  .study-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .study-header .progress {
    font-size: 0.82rem;
    color: #666;
  }

  .study-controls { display: flex; gap: 8px; }

  .flashcard {
    background: #16161e;
    border: 1px solid #2a2a3a;
    border-radius: 14px;
    padding: 36px 32px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }

  .flashcard .card-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a78bfa;
    margin-bottom: 10px;
  }

  .flashcard .card-question {
    font-size: 1.25rem;
    font-weight: 500;
    color: #e8e8f0;
    line-height: 1.5;
  }

  .answer-section { margin-bottom: 20px; }

  .answer-section label {
    display: block;
    font-size: 0.78rem;
    color: #666;
    margin-bottom: 8px;
  }

  .answer-section textarea {
    width: 100%;
    background: #16161e;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 14px 16px;
    color: #e8e8f0;
    font-size: 0.95rem;
    font-family: inherit;
    resize: vertical;
    min-height: 90px;
    transition: border-color 0.15s;
  }

  .answer-section textarea:focus { outline: none; border-color: #a78bfa; }

  .submit-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #3a3a55;
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .feedback-box {
    background: #12121a;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 16px 18px;
    min-height: 60px;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #aaa;
    display: none;
  }

  .feedback-box.visible { display: block; }
  .feedback-box.grading { color: #666; font-style: italic; }

  .feedback-correct { border-color: #22c55e44; background: #0d1f14; }
  .feedback-partial { border-color: #f59e0b44; background: #1a160a; }
  .feedback-wrong   { border-color: #ef444444; background: #1f0d0d; }

  .feedback-score {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .score-correct { background: #22c55e22; color: #22c55e; }
  .score-partial  { background: #f59e0b22; color: #f59e0b; }
  .score-wrong    { background: #ef444422; color: #ef4444; }

  .feedback-actual {
    font-size: 0.82rem;
    color: #888;
    margin: 8px 0 10px;
    padding: 7px 10px;
    background: #1a1a28;
    border-radius: 6px;
    border-left: 2px solid #3a3a55;
  }

  /* Markdown rendering inside study card and feedback */
  .card-question p, .feedback-actual p, .feedback-line p { margin: 0 0 0.5em; }
  .card-question p:last-child, .feedback-actual p:last-child { margin-bottom: 0; }
  .card-question ul, .card-question ol,
  .feedback-actual ul, .feedback-actual ol { padding-left: 1.4em; margin: 0.4em 0; }
  .card-question li, .feedback-actual li { margin: 0.15em 0; }
  .card-question code, .feedback-actual code {
    background: #1e1e30; border-radius: 4px; padding: 1px 5px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9em; color: #c4b5fd;
  }
  .card-question pre, .feedback-actual pre {
    background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 6px;
    padding: 10px 12px; overflow-x: auto; margin: 0.5em 0;
  }
  .card-question pre code, .feedback-actual pre code {
    background: none; padding: 0; color: #e8e8f0;
  }
  .card-question strong, .feedback-actual strong { color: #e8e8f0; font-weight: 600; }
  .card-question em, .feedback-actual em { color: #c4b5fd; font-style: italic; }
  .card-question blockquote, .feedback-actual blockquote {
    border-left: 3px solid #a78bfa; margin: 0.5em 0; padding: 4px 10px;
    color: #888; background: #1a1a28; border-radius: 0 4px 4px 0;
  }
  .card-question h1,.card-question h2,.card-question h3,
  .card-question h4,.card-question h5,.card-question h6 {
    color: #c4b5fd; margin: 0.3em 0 0.2em; font-weight: 600; line-height: 1.3;
  }
  .card-question table, .feedback-actual table {
    border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 0.9em;
  }
  .card-question th, .feedback-actual th {
    background: #1e1e30; color: #c4b5fd; font-weight: 600;
    padding: 6px 10px; border: 1px solid #3a3a55; text-align: left;
  }
  .card-question td, .feedback-actual td {
    padding: 5px 10px; border: 1px solid #2a2a3a; color: #ccc;
  }
  .card-question tr:nth-child(even), .feedback-actual tr:nth-child(even) {
    background: #1a1a26;
  }

  .feedback-actual-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    margin-right: 6px;
  }

  .feedback-line {
    font-size: 0.88rem;
    margin-top: 7px;
    line-height: 1.5;
  }

  .feedback-line-ok  { color: #4ade80; }
  .feedback-line-bad { color: #f87171; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
  }

  .nav-row .nav-btns { display: flex; gap: 8px; }

  .no-cards {
    text-align: center;
    padding: 80px 20px;
    color: #444;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <h1>Flashcards</h1>
  <div class="mode-tabs">
    <button class="active" onclick="setMode('manage')">Manage</button>
    <button onclick="setMode('study')">Study</button>
  </div>
  <div class="lm-url">
    <span>LM Studio</span>
    <input id="lm-url" type="text" value="http://localhost:1234" placeholder="http://localhost:1234">
  </div>
</header>

<main>

  <!-- MANAGE VIEW -->
  <div id="manage-view">
    <div class="toolbar">
      <span class="count-badge" id="card-count">0 cards</span>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="file" id="md-file-input" accept=".md,.txt" style="display:none" onchange="handleMDFile(event)">
        <button class="btn btn-ghost" onclick="document.getElementById('md-file-input').click()">↑ Load MD</button>
        <button class="btn btn-ghost" onclick="saveMD()">↓ Save MD</button>
        <button class="btn btn-primary" onclick="openAddForm()">+ Add Card</button>
      </div>
    </div>

    <div class="card-form" id="card-form">
      <h3 id="form-title">New Card</h3>
      <div class="field">
        <label>Question</label>
        <textarea id="form-q" rows="2" placeholder="e.g. What is the capital of France?"></textarea>
      </div>
      <div class="field">
        <label>Answer</label>
        <textarea id="form-a" rows="2" placeholder="e.g. Paris"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveCard()">Save</button>
        <button class="btn btn-ghost" onclick="closeForm()">Cancel</button>
      </div>
    </div>

    <div class="card-list" id="card-list"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div style="font-size:2rem">🗂</div>
      <p>No cards yet. Add one above to get started.</p>
    </div>
  </div>

  <!-- STUDY VIEW -->
  <div id="study-view">
    <div id="study-empty" class="no-cards" style="display:none">
      No cards to study. Add some in Manage mode first.
    </div>
    <div id="study-content">
      <div class="study-header">
        <span class="progress" id="study-progress">Card 1 of 1</span>
        <div class="study-controls">
          <button class="btn btn-ghost btn-sm" onclick="shuffleCards()">⇄ Shuffle</button>
          <button class="btn btn-ghost btn-sm" onclick="resetStudy()">↺ Reset</button>
        </div>
      </div>

      <div class="flashcard">
        <div class="card-label">Question</div>
        <div class="card-question" id="study-question">—</div>
      </div>

      <div class="answer-section">
        <label>Your Answer</label>
        <textarea id="user-answer" placeholder="Type your answer here…" onkeydown="handleAnswerKey(event)"></textarea>
      </div>

      <div class="submit-row">
        <button class="btn btn-primary" onclick="submitAnswer()">Submit Answer</button>
        <div class="spinner" id="spinner"></div>
      </div>

      <div class="feedback-box" id="feedback-box"></div>

      <div class="nav-row">
        <div class="nav-btns">
          <button class="btn btn-ghost" onclick="navigate(-1)">← Prev</button>
          <button class="btn btn-ghost" onclick="navigate(1)">Next →</button>
        </div>
        <span style="font-size:0.78rem;color:#555">Ctrl+Enter to submit</span>
      </div>
    </div>
  </div>

</main>

<script>
const STORAGE_KEY = 'flashcards_v1';

let cards = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let studyOrder = [];
let studyIndex = 0;
let editingId = null;

// ── persistence ──────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
}

// ── mode switching ───────────────────────────────────────
function setMode(mode) {
  document.querySelectorAll('.mode-tabs button').forEach((b, i) =>
    b.classList.toggle('active', (mode === 'manage' && i === 0) || (mode === 'study' && i === 1))
  );
  document.getElementById('manage-view').style.display = mode === 'manage' ? 'block' : 'none';
  document.getElementById('study-view').style.display  = mode === 'study'  ? 'block' : 'none';
  if (mode === 'study') initStudy();
}

// ── manage helpers ───────────────────────────────────────
function renderCards() {
  const list = document.getElementById('card-list');
  const empty = document.getElementById('empty-state');
  document.getElementById('card-count').textContent = `${cards.length} card${cards.length !== 1 ? 's' : ''}`;
  if (!cards.length) { list.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  list.innerHTML = cards.map(c => `
    <div class="card-item" id="ci-${c.id}">
      <div class="card-item-content">
        <div class="card-item-q">${esc(c.q)}</div>
        <div class="card-item-a">${esc(c.a)}</div>
      </div>
      <div class="card-item-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditForm('${c.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCard('${c.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openAddForm() {
  editingId = null;
  document.getElementById('form-title').textContent = 'New Card';
  document.getElementById('form-q').value = '';
  document.getElementById('form-a').value = '';
  const form = document.getElementById('card-form');
  form.classList.add('open');
  document.getElementById('form-q').focus();
}

function openEditForm(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('form-title').textContent = 'Edit Card';
  document.getElementById('form-q').value = c.q;
  document.getElementById('form-a').value = c.a;
  const form = document.getElementById('card-form');
  form.classList.add('open');
  form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('form-q').focus();
}

function closeForm() {
  document.getElementById('card-form').classList.remove('open');
  editingId = null;
}

function saveCard() {
  const q = document.getElementById('form-q').value.trim();
  const a = document.getElementById('form-a').value.trim();
  if (!q || !a) { alert('Both Question and Answer are required.'); return; }
  if (editingId) {
    const c = cards.find(x => x.id === editingId);
    if (c) { c.q = q; c.a = a; }
  } else {
    cards.push({ id: crypto.randomUUID(), q, a });
  }
  save();
  renderCards();
  closeForm();
}

function deleteCard(id) {
  if (!confirm('Delete this card?')) return;
  cards = cards.filter(c => c.id !== id);
  save();
  renderCards();
}

// ── study helpers ────────────────────────────────────────
function initStudy() {
  if (!cards.length) {
    document.getElementById('study-empty').style.display = '';
    document.getElementById('study-content').style.display = 'none';
    return;
  }
  document.getElementById('study-empty').style.display = 'none';
  document.getElementById('study-content').style.display = '';
  studyOrder = cards.map((_, i) => i);
  studyIndex = 0;
  renderStudyCard();
}

function resetStudy() {
  studyOrder = cards.map((_, i) => i);
  studyIndex = 0;
  renderStudyCard();
}

function shuffleCards() {
  for (let i = studyOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [studyOrder[i], studyOrder[j]] = [studyOrder[j], studyOrder[i]];
  }
  studyIndex = 0;
  renderStudyCard();
}

function renderStudyCard() {
  const card = cards[studyOrder[studyIndex]];
  document.getElementById('study-question').innerHTML = marked.parse(card.q);
  document.getElementById('study-progress').textContent = `Card ${studyIndex + 1} of ${studyOrder.length}`;
  document.getElementById('user-answer').value = '';
  hideFeedback();
  document.getElementById('user-answer').focus();
}

function navigate(dir) {
  const next = studyIndex + dir;
  if (next < 0 || next >= studyOrder.length) return;
  studyIndex = next;
  renderStudyCard();
}

function handleAnswerKey(e) {
  if (e.ctrlKey && e.key === 'Enter') submitAnswer();
}

function hideFeedback() {
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.innerHTML = '';
}

// ── LLM grading ──────────────────────────────────────────
async function submitAnswer() {
  const userAns = document.getElementById('user-answer').value.trim();
  if (!userAns) { document.getElementById('user-answer').focus(); return; }

  const card = cards[studyOrder[studyIndex]];
  const baseUrl = document.getElementById('lm-url').value.replace(/\/$/, '');

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box grading visible';
  fb.textContent = 'Grading your answer…';

  const spinner = document.getElementById('spinner');
  spinner.style.display = 'block';

  const prompt = `/no_think Du bist ein strenger, aber hilfreicher Karteikarten-Bewerter. Frage, Musterantwort und Schülerantwort sind auf Deutsch. Ignoriere Rechtschreib- und Grammatikfehler in der Schülerantwort vollständig — bewertet wird nur der inhaltliche Kern.

Frage: "${card.q}"
Richtige Antwort: "${card.a}"
Antwort des Schülers: "${userAns}"

Antworte GENAU in diesem Format (kein zusätzlicher Text):
SCORE: <correct|partial|wrong>
CORRECT: <ein vollständiger Satz auf Deutsch, der erklärt, was der Schüler richtig hatte — oder "nichts" wenn SCORE wrong ist>
WRONG: <ein vollständiger Satz auf Deutsch, der erklärt, was fehlte oder falsch war — oder "nichts" wenn SCORE correct ist>`;

  try {
    const res = await fetch(`${baseUrl}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'local-model',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.3,
        max_tokens: 20000,
        stream: false
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim() || '';
    renderFeedback(reply, card.a);
  } catch (err) {
    fb.className = 'feedback-box feedback-wrong visible';
    fb.innerHTML = `<strong>Could not reach LM Studio.</strong><br><small>${err.message}</small><br><small style="color:#555">Make sure LM Studio is running with the local server enabled at ${baseUrl}</small>`;
  } finally {
    spinner.style.display = 'none';
  }
}

function renderFeedback(reply, correctAnswer) {
  const fb = document.getElementById('feedback-box');

  if (!reply) {
    fb.className = 'feedback-box feedback-wrong visible';
    fb.innerHTML = `<strong>No response from model.</strong><br><small style="color:#888">The model returned an empty reply. Make sure a model is loaded in LM Studio.</small>`;
    return;
  }

  const scoreMatch   = reply.match(/SCORE:\s*(correct|partial|wrong)/i);
  const correctMatch = reply.match(/CORRECT:\s*(.+)/i);
  const wrongMatch   = reply.match(/WRONG:\s*(.+)/i);

  if (!scoreMatch) {
    fb.className = 'feedback-box feedback-partial visible';
    fb.innerHTML = `<span class="feedback-score score-partial">~ Unparseable</span>
<div class="feedback-actual"><span class="feedback-actual-label">Answer</span>${marked.parse(correctAnswer)}</div>
<div class="feedback-line" style="color:#aaa;white-space:pre-wrap">${esc(reply)}</div>`;
    return;
  }

  const score       = scoreMatch[1].toLowerCase();
  const correctText = correctMatch ? correctMatch[1].trim() : '';
  const wrongText   = wrongMatch   ? wrongMatch[1].trim()   : '';

  const scoreClass = { correct: 'feedback-correct', partial: 'feedback-partial', wrong: 'feedback-wrong' }[score] || 'feedback-partial';
  const badgeClass = { correct: 'score-correct',    partial: 'score-partial',    wrong: 'score-wrong'    }[score] || 'score-partial';
  const label      = { correct: '✓ Correct',         partial: '~ Partial',        wrong: '✗ Wrong'        }[score] || score;

  const skip = t => !t || t.toLowerCase() === 'nothing' || t.toLowerCase() === 'nichts';
  const correctLine = !skip(correctText)
    ? `<div class="feedback-line feedback-line-ok">✓ ${esc(correctText)}</div>` : '';
  const wrongLine = !skip(wrongText)
    ? `<div class="feedback-line feedback-line-bad">✗ ${esc(wrongText)}</div>` : '';

  fb.className = `feedback-box ${scoreClass} visible`;
  fb.innerHTML = `<span class="feedback-score ${badgeClass}">${label}</span>
<div class="feedback-actual"><span class="feedback-actual-label">Answer</span>${marked.parse(correctAnswer)}</div>
${correctLine}${wrongLine}`;
}

// ── MD import/export ─────────────────────────────────────
function parseMD(text) {
  const lines = text.split('\n');
  const parsed = [];
  let state = 'idle';
  let qLines = [], aLines = [];

  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed === '#Q') {
      state = 'question';
      qLines = [];
      aLines = [];
    } else if (trimmed === '#A' && state === 'question') {
      state = 'answer';
    } else if (trimmed === '#/Q' && state === 'answer') {
      const q = qLines.join('\n').trim();
      const a = aLines.join('\n').trim();
      if (q && a) parsed.push({ id: crypto.randomUUID(), q, a });
      state = 'idle';
    } else if (state === 'question' && !trimmed.startsWith('<!--')) {
      qLines.push(line);
    } else if (state === 'answer' && !trimmed.startsWith('<!--')) {
      aLines.push(line);
    }
  }
  return parsed;
}

function handleMDFile(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseMD(e.target.result);
    if (!parsed.length) { alert('No cards found. Make sure the file uses #Q / #A / #/Q markers.'); return; }
    const replace = cards.length === 0 || confirm(
      `Found ${parsed.length} card${parsed.length !== 1 ? 's' : ''}.\n\nReplace all existing cards? (Cancel to append)`
    );
    if (replace) cards = parsed;
    else cards.push(...parsed);
    save();
    renderCards();
  };
  reader.readAsText(file);
}

function saveMD() {
  if (!cards.length) { alert('No cards to save.'); return; }
  const parts = ['---', 'tags:', '  - "#flashcards"', '---', ''];
  for (const c of cards) {
    parts.push('#Q');
    parts.push(c.q);
    parts.push('#A');
    parts.push(c.a);
    parts.push('#/Q');
    parts.push('');
    parts.push('---');
    parts.push('');
  }
  const blob = new Blob([parts.join('\n')], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'flashcards.md';
  a.click();
  URL.revokeObjectURL(url);
}

// ── init ─────────────────────────────────────────────────
renderCards();
</script>
