name: Update tools.json

on:
  push:
    paths:
      - 'tools/**'
      - 'Flashcards/**'
      - 'scripts/generate-tools.js'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate tools.json
        run: node scripts/generate-tools.js

      - name: Commit updated tools.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools.json
          git diff --cached --quiet || git commit -m "chore: regenerate tools.json"
          git push
