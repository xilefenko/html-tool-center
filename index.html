<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Control Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3250;
      --accent: #6c8ef5;
      --accent-dim: #3d4f99;
      --text: #e2e8f0;
      --text-dim: #8892b0;
      --sidebar-w: 260px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .02em;
    }

    #sidebar-header p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    #search-wrap {
      padding: 10px 12px;
      flex-shrink: 0;
    }

    #search {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }

    #search::placeholder { color: var(--text-dim); }
    #search:focus { border-color: var(--accent); }

    #tool-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 12px;
    }

    #tool-list::-webkit-scrollbar { width: 4px; }
    #tool-list::-webkit-scrollbar-track { background: transparent; }
    #tool-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: background .12s, color .12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-btn:hover { background: var(--surface-2); color: var(--text); }

    .tool-btn.active {
      background: var(--accent-dim);
      color: var(--text);
    }

    .tool-btn .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: .6;
    }

    .tool-btn.active .icon { opacity: 1; }

    #empty-msg {
      color: var(--text-dim);
      font-size: 12px;
      padding: 12px 10px;
      display: none;
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      height: 44px;
      min-height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
    }

    #active-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tb-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 12px;
      padding: 5px 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color .12s, border-color .12s;
      white-space: nowrap;
    }

    .tb-btn:hover { color: var(--text); border-color: var(--accent); }
    .tb-btn:disabled { opacity: .35; cursor: default; }
    .tb-btn:disabled:hover { color: var(--text-dim); border-color: var(--border); }

    #viewer-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
    }

    #placeholder svg { opacity: .25; }

    #placeholder p { font-size: 13px; }

    /* ── Keyboard hint ── */
    #kb-hint {
      position: fixed;
      bottom: 12px;
      right: 14px;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
    }

    kbd {
      font-family: inherit;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 10px;
    }

    /* ── README modal ── */
    #readme-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #readme-overlay.open { display: flex; }

    #readme-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 740px;
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #readme-header {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }

    #readme-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    #readme-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 2px 6px;
      font-size: 18px;
      line-height: 1;
      border-radius: 4px;
      transition: color .12s, background .12s;
    }

    #readme-close:hover { color: var(--text); background: var(--surface-2); }

    #readme-body {
      padding: 20px 24px;
      overflow-y: auto;
      line-height: 1.65;
      font-size: 14px;
      color: var(--text);
    }

    #readme-body::-webkit-scrollbar { width: 4px; }
    #readme-body::-webkit-scrollbar-track { background: transparent; }
    #readme-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Markdown styles */
    #readme-body h1 { font-size: 1.5em; font-weight: 700; margin: 0 0 .6em; color: var(--text); }
    #readme-body h2 { font-size: 1.2em; font-weight: 600; margin: 1.2em 0 .5em; padding-bottom: .3em; border-bottom: 1px solid var(--border); color: var(--text); }
    #readme-body h3 { font-size: 1em; font-weight: 600; margin: 1em 0 .4em; color: var(--text); }
    #readme-body p { margin: .6em 0; }
    #readme-body ul, #readme-body ol { padding-left: 1.4em; margin: .5em 0; }
    #readme-body li { margin: .25em 0; }
    #readme-body pre { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; overflow-x: auto; margin: .8em 0; }
    #readme-body pre code { background: none; border: none; padding: 0; font-size: 13px; color: #a8d8a8; }
    #readme-body code { background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: .875em; color: #f8c8a0; font-family: ui-monospace, monospace; }
    #readme-body a { color: var(--accent); text-decoration: none; }
    #readme-body a:hover { text-decoration: underline; }
    #readme-body strong { font-weight: 600; color: var(--text); }
    #readme-body em { font-style: italic; }
    #readme-body .md-no-readme { color: var(--text-dim); font-style: italic; }
  </style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>Tool Center</h1>
    <p id="tool-count">Loading…</p>
  </div>
  <div id="search-wrap">
    <input id="search" type="search" placeholder="Search tools… (Ctrl+K)" autocomplete="off">
  </div>
  <div id="tool-list"></div>
  <div id="empty-msg">No tools match your search.</div>
</nav>

<div id="main">
  <div id="toolbar">
    <span id="active-title">No tool selected</span>
    <button class="tb-btn" id="btn-readme" disabled title="View README">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      README
    </button>
    <button class="tb-btn" id="btn-reload" disabled title="Reload current tool (Ctrl+R)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
      </svg>
      Reload
    </button>
    <button class="tb-btn" id="btn-open" disabled title="Open in new tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open tab
    </button>
  </div>

  <div id="viewer-wrap">
    <div id="placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <p>Select a tool from the sidebar</p>
    </div>
    <iframe id="viewer" src="about:blank" title="Tool viewer" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
  </div>
</div>

<div id="kb-hint"><kbd>Ctrl+K</kbd> search &nbsp;·&nbsp; <kbd>↑↓</kbd> navigate &nbsp;·&nbsp; <kbd>Enter</kbd> open</div>

<div id="readme-overlay">
  <div id="readme-card">
    <div id="readme-header">
      <span id="readme-title">README</span>
      <button id="readme-close" title="Close (Esc)">&#x2715;</button>
    </div>
    <div id="readme-body"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'tcc_last_tool';
  const list = document.getElementById('tool-list');
  const emptyMsg = document.getElementById('empty-msg');
  const search = document.getElementById('search');
  const viewer = document.getElementById('viewer');
  const placeholder = document.getElementById('placeholder');
  const activeTitle = document.getElementById('active-title');
  const btnReload = document.getElementById('btn-reload');
  const btnOpen = document.getElementById('btn-open');
  const btnReadme = document.getElementById('btn-readme');
  const toolCount = document.getElementById('tool-count');
  const readmeOverlay = document.getElementById('readme-overlay');
  const readmeTitle = document.getElementById('readme-title');
  const readmeBody = document.getElementById('readme-body');

  let tools = [];
  let activeTool = null;
  let focusIndex = -1;

  // ── Tool icon SVG (generic) ──
  const iconSVG = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <path d="M8 12h8M12 8v8"/>
  </svg>`;

  async function loadTools() {
    try {
      // Bust cache so GitHub Pages reflects recent pushes
      const res = await fetch('tools.json?t=' + Date.now());
      if (!res.ok) throw new Error(res.statusText);
      tools = await res.json();
    } catch {
      tools = [];
      toolCount.textContent = 'Could not load tools.json';
      renderList('');
      return;
    }
    toolCount.textContent = `${tools.length} tool${tools.length !== 1 ? 's' : ''}`;
    renderList('');
    restoreLastTool();
    applyURLParam();
  }

  function renderList(query) {
    const q = query.toLowerCase().trim();
    const filtered = q ? tools.filter(t => t.name.toLowerCase().includes(q)) : tools;

    list.innerHTML = '';
    focusIndex = -1;

    if (filtered.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    filtered.forEach((tool, i) => {
      const btn = document.createElement('button');
      btn.className = 'tool-btn' + (activeTool?.file === tool.file ? ' active' : '');
      btn.dataset.i = i;
      btn.innerHTML = `${iconSVG}<span>${tool.name}</span>`;
      btn.addEventListener('click', () => selectTool(tool));
      list.appendChild(btn);
    });
  }

  function selectTool(tool) {
    activeTool = tool;
    placeholder.style.display = 'none';
    viewer.src = tool.file;
    activeTitle.textContent = tool.name;
    btnReload.disabled = false;
    btnOpen.disabled = false;
    btnReadme.disabled = false;
    localStorage.setItem(STORAGE_KEY, tool.file);
    updateURL(tool.name);
    // Re-render to update active highlight
    renderList(search.value);
  }

  function restoreLastTool() {
    const last = localStorage.getItem(STORAGE_KEY);
    if (!last) return;
    const tool = tools.find(t => t.file === last);
    if (tool) selectTool(tool);
  }

  function applyURLParam() {
    const params = new URLSearchParams(location.search);
    const name = params.get('tool');
    if (!name) return;
    const tool = tools.find(t => t.name.toLowerCase() === name.toLowerCase());
    if (tool) selectTool(tool);
  }

  function updateURL(name) {
    const url = new URL(location.href);
    url.searchParams.set('tool', name);
    history.replaceState(null, '', url);
  }

  // ── Search ──
  search.addEventListener('input', () => renderList(search.value));

  // ── README modal ──
  function renderMarkdown(md) {
    // Escape HTML
    let html = md
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Fenced code blocks (must come before inline code)
    html = html.replace(/```[^\n]*\n([\s\S]*?)```/g, (_, code) =>
      `<pre><code>${code.trimEnd()}</code></pre>`);

    // Headings
    html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
    html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Bold + italic (order matters)
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Unordered list items → wrap consecutive <li> in <ul>
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>)(\n(?!<li>)|$)/g, '$1\n</ul>\n');
    html = html.replace(/(?<!<\/ul>\n|<ul>\n)(<li>)/g, '<ul>\n$1');

    // Paragraphs: blank lines → paragraph breaks
    html = html.split(/\n{2,}/).map(block => {
      if (/^<(h[1-6]|pre|ul|ol|li)/.test(block.trim())) return block;
      const trimmed = block.trim();
      if (!trimmed) return '';
      return `<p>${trimmed.replace(/\n/g, ' ')}</p>`;
    }).join('\n');

    return html;
  }

  async function openReadme() {
    if (!activeTool) return;
    const dir = activeTool.file.substring(0, activeTool.file.lastIndexOf('/'));
    const readmePath = dir + '/README.md';
    readmeTitle.textContent = activeTool.name + ' — README';
    readmeBody.innerHTML = '<p style="color:var(--text-dim)">Loading…</p>';
    readmeOverlay.classList.add('open');

    try {
      const res = await fetch(readmePath + '?t=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      readmeBody.innerHTML = renderMarkdown(text);
    } catch {
      readmeBody.innerHTML = '<p class="md-no-readme">No README found for this tool.</p>';
    }
  }

  function closeReadme() {
    readmeOverlay.classList.remove('open');
  }

  btnReadme.addEventListener('click', openReadme);
  document.getElementById('readme-close').addEventListener('click', closeReadme);
  readmeOverlay.addEventListener('click', e => { if (e.target === readmeOverlay) closeReadme(); });

  // ── Toolbar buttons ──
  btnReload.addEventListener('click', () => {
    if (activeTool) viewer.src = activeTool.file;
  });

  btnOpen.addEventListener('click', () => {
    if (activeTool) window.open(activeTool.file, '_blank');
  });

  // ── Keyboard navigation ──
  document.addEventListener('keydown', e => {
    // Escape → close README modal
    if (e.key === 'Escape' && readmeOverlay.classList.contains('open')) {
      closeReadme();
      return;
    }

    // Ctrl+K → focus search
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      search.focus();
      search.select();
      return;
    }

    // Ctrl+R → reload active tool
    if ((e.ctrlKey || e.metaKey) && e.key === 'r' && activeTool && document.activeElement !== search) {
      e.preventDefault();
      viewer.src = activeTool.file;
      return;
    }

    // Arrow navigation in list (only when sidebar is focused or search is focused)
    const btns = [...list.querySelectorAll('.tool-btn')];
    if (btns.length === 0) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusIndex = Math.min(focusIndex + 1, btns.length - 1);
      btns[focusIndex]?.focus();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusIndex = Math.max(focusIndex - 1, 0);
      btns[focusIndex]?.focus();
    } else if (e.key === 'Enter' && document.activeElement.classList.contains('tool-btn')) {
      document.activeElement.click();
    }
  });

  loadTools();
</script>
</body>
</html>
